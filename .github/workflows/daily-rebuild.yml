name: Daily Rebuild

on:
  schedule:
    # Runs every day at 13:00 UTC (14:00 CET / 15:00 CEST)
    - cron: '0 13 * * *'
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  trigger-netlify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Build
        run: curl -X POST -d {} "${{ secrets.NETLIFY_BUILD_HOOK }}"
