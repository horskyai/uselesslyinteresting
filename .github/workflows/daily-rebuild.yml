name: Daily Rebuild

on:
  schedule:
    # Runs every day at 6:00 AM UTC (7:00 or 8:00 CET/CEST)
    - cron: '0 6 * * *'
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  trigger-netlify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Build
        run: curl -X POST -d {} "${{ secrets.NETLIFY_BUILD_HOOK }}"
