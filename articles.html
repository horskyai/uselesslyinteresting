<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Articles — UselesslyInteresting</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff; --surface: #f4f4f4; --card: #f9f9f9; --card-hover: #f0f0f0;
      --accent: #6ab000; --accent2: #c4168c; --accent3: #0088bb;
      --text: #111111; --muted: #666666; --border: #e0e0e0;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: Arial, Helvetica, sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center;
      justify-content: space-between; height: 64px;
    }
    .logo { font-weight: 900; font-size: 1.25rem; letter-spacing: -0.03em; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    nav { display: flex; align-items: center; gap: 0.25rem; position: absolute; left: 50%; transform: translateX(-50%); }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.82rem; font-weight: 500; padding: 0.45rem 0.9rem; border-radius: 6px; transition: background 0.15s, color 0.15s; }
    nav a:hover { background: var(--surface); color: var(--text); }
    nav a.active { color: var(--accent); font-weight: 700; }
    .nav-cta { background: var(--accent); color: #fff !important; border-radius: 6px; padding: 0.45rem 1.1rem !important; font-weight: 700 !important; margin-left: 0.5rem; }
    .nav-cta:hover { opacity: 0.85; background: var(--accent) !important; color: #fff !important; }

    .top-controls { display: flex; align-items: center; gap: 0.5rem; }
    .lang-dropdown { position: relative; display: inline-block; }
    .lang-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: Arial, Helvetica, sans-serif; font-size: 0.78rem; font-weight: 600; padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .lang-btn:hover { background: #e8e8e8; }
    .lang-menu { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 1px solid var(--border); border-radius: 8px; min-width: 140px; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.1); overflow: hidden; }
    .lang-menu.open { display: block; }
    .lang-menu button { display: block; width: 100%; background: transparent; border: none; color: var(--text); font-family: Arial, Helvetica, sans-serif; font-size: 0.82rem; padding: 0.65rem 1rem; cursor: pointer; text-align: left; transition: background 0.15s; }
    .lang-menu button:hover { background: var(--surface); }
    .lang-menu button.active { color: var(--accent); font-weight: 700; }

    .hamburger { display: none; background: transparent; border: 1px solid var(--border); color: var(--text); font-size: 1.2rem; padding: 0.3rem 0.7rem; border-radius: 6px; cursor: pointer; }
    .mobile-menu { display: none; flex-direction: column; background: #fff; border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; gap: 0.3rem; }
    .mobile-menu a { color: var(--text); text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.6rem 0.8rem; border-radius: 6px; }
    .mobile-menu a:hover { background: var(--surface); }
    .mobile-menu.open { display: flex; }
    .mobile-lang-submenu { display: none; flex-wrap: wrap; gap: 0.4rem; padding: 0.5rem 0.8rem; }
    .mobile-lang-submenu.open { display: flex; }
    .mobile-lang-submenu button { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: Arial, Helvetica, sans-serif; font-size: 0.78rem; padding: 0.35rem 0.7rem; border-radius: 4px; cursor: pointer; }
    .mobile-lang-submenu button.active { color: var(--accent); border-color: var(--accent); font-weight: 700; }

    @media (max-width: 768px) {
      nav a { display: none; } .nav-cta { display: none; }
      .hamburger { display: block; } .top-controls { display: none; }
    }

    /* ── HERO ── */
    .hero { padding: 4rem 2rem 2.5rem; max-width: 1100px; margin: 0 auto; }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--accent); background: rgba(106,176,0,0.08); border: 1px solid rgba(106,176,0,0.25);
      padding: 0.3rem 0.8rem; border-radius: 100px; margin-bottom: 1.5rem;
      animation: fadeUp 0.5s ease both;
    }
    .hero h1 { font-weight: 900; font-size: clamp(2.5rem, 7vw, 5rem); line-height: 1.0; letter-spacing: -0.04em; animation: fadeUp 0.5s 0.1s ease both; }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero-desc { max-width: 540px; margin-top: 1.2rem; font-size: 1rem; color: var(--muted); line-height: 1.65; animation: fadeUp 0.5s 0.2s ease both; }

    /* ── ARTICLES ── */
    .articles-section { max-width: 1100px; margin: 0 auto; padding: 0 2rem 6rem; }
    .section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }

    .article-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 2rem; position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease both;
      text-decoration: none; color: inherit; display: flex; flex-direction: column;
    }
    .article-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.09); }
    .article-card::before { display: none; }

    .article-card .cat-tag {
      display: inline-block; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--accent); background: rgba(106,176,0,0.08);
      border: 1px solid rgba(106,176,0,0.2);
      padding: 0.2rem 0.65rem; border-radius: 100px;
      margin-bottom: 1rem; align-self: flex-start;
    }

    .article-card h2 { font-weight: 700; font-size: clamp(1.1rem, 2.5vw, 1.4rem); line-height: 1.25; margin-bottom: 0.8rem; word-wrap: break-word; }
    .article-card .desc { font-size: 0.88rem; color: var(--muted); line-height: 1.65; flex: 1; }
    .article-card .meta { margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .article-card .date { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    .article-card .read-link { font-weight: 700; font-size: 0.78rem; color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
    .article-card .read-link:hover { opacity: 0.7; }

    footer { border-top: 1px solid var(--border); padding: 2rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.72rem; color: var(--muted); max-width: 1100px; margin: 0 auto; }
    @media (max-width: 680px) { .articles-grid { grid-template-columns: 1fr; } footer { flex-direction: column; gap: 0.5rem; text-align: center; } }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">Uselessly<span>Interesting</span></a>
    <nav>
      <a href="index.html" data-i18n="nav_home">Home</a>
      <a href="about.html" data-i18n="nav_about">About</a>
      <a href="https://www.instagram.com/uselesslyinteresting" target="_blank" data-i18n="nav_instagram">Instagram</a>
      <a href="articles.html" class="nav-cta active" data-i18n="nav_articles">Articles</a>
      <button class="hamburger" onclick="toggleMenu()" id="hamburger-btn">☰</button>
    </nav>
    <div class="top-controls">
      <div class="lang-dropdown">
        <button class="lang-btn" onclick="toggleLangMenu()" id="lang-btn">🌐 EN</button>
        <div class="lang-menu" id="lang-menu">
          <button onclick="setLanguage('en')" class="active">🇬🇧 English</button>
          <button onclick="setLanguage('es')">🇪🇸 Español</button>
          <button onclick="setLanguage('zh')">🇨🇳 中文</button>
        </div>
      </div>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <a href="index.html" onclick="toggleMenu()" data-i18n="nav_home">Home</a>
      <a href="articles.html" onclick="toggleMenu()" data-i18n="nav_articles">Articles</a>
      <a href="about.html" onclick="toggleMenu()" data-i18n="nav_about">About</a>
      <a href="https://www.instagram.com/uselesslyinteresting" target="_blank" onclick="toggleMenu()" data-i18n="nav_instagram">Instagram</a>
      <a href="#" onclick="toggleMobileLangSubmenu(); return false;" id="mobile-lang-btn">🌐 English ▾</a>
      <div class="mobile-lang-submenu" id="mobile-lang-submenu">
        <button onclick="setLanguage('en'); closeMobileLangSubmenu();">🇬🇧 English</button>
        <button onclick="setLanguage('es'); closeMobileLangSubmenu();">🇪🇸 Español</button>
        <button onclick="setLanguage('zh'); closeMobileLangSubmenu();">🇨🇳 中文</button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-tag" data-i18n="articles_hero_tag">✦ Long reads</div>
    <h1 data-i18n="articles_hero_title">All <em>Articles.</em></h1>
    <p class="hero-desc" data-i18n="articles_hero_desc">Deep dives into the weird, wild, and wonderfully useless.</p>
  </div>

  <!-- ARTICLES LIST -->
  <div class="articles-section">
    <div class="section-label" data-i18n="articles_section_label">Pillar articles</div>
    <div class="articles-grid" id="articles-grid">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span data-i18n="footer_copy">© 2026 UselesslyInteresting</span>
    <span data-i18n="footer_tagline">Facts nobody asked for, delivered daily</span>
    <span><a href="privacy.html" style="color:var(--muted);text-decoration:none;" data-i18n="footer_privacy">Privacy Policy</a></span>
  </footer>

  <script>
  var langNames = { en: 'English', es: 'Español', zh: '中文' };
  var langFlags = { en: '🇬🇧', es: '🇪🇸', zh: '🇨🇳' };
  var i18nData = null;
  var currentLang = 'en';

  // All articles with publish time (13:00 UTC = 14:00 CET)
  var allArticles = [
    { slug: 'einstein-failed-math-is-a-myth',                       key: 'einstein', publishAt: '2026-04-15T12:00:00Z' },
    { slug: 'language-with-no-word-for-left-or-right',             key: 'guugu',    publishAt: '2026-04-14T12:00:00Z' },
    { slug: 'why-marathon-runners-hit-the-wall-mile-20',           key: 'marathon', publishAt: '2026-04-13T12:00:00Z' },
    { slug: 'country-that-doesnt-exist-but-has-passport',          key: 'sealand',  publishAt: '2026-04-12T12:00:00Z' },
    { slug: 'art-thief-who-stole-mona-lisa-made-her-famous',       key: 'monalisa', publishAt: '2026-04-11T12:00:00Z' },
    { slug: 'bystander-effect-more-witnesses-less-help',           key: 'bystander',publishAt: '2026-04-10T12:00:00Z' },
    { slug: 'ketchup-was-sold-as-medicine',                        key: 'ketchup',  publishAt: '2026-04-09T12:00:00Z' },
    { slug: 'charlie-chaplin-lost-his-own-look-alike-contest',     key: 'chaplin',  publishAt: '2026-04-08T12:00:00Z' },
    { slug: 'insects-are-disappearing-so-fast-nobody-noticed',     key: 'insects',  publishAt: '2026-03-30T13:00:00Z' },
    { slug: 'time-moves-faster-for-your-face-than-your-feet',      key: 'time',     publishAt: '2026-03-29T13:00:00Z' },
    { slug: 'crows-remember-your-face-and-tell-their-friends',     key: 'crows',    publishAt: '2026-03-28T13:00:00Z' },
    { slug: 'bacteria-in-your-gut-are-controlling-your-thoughts',  key: 'gut',      publishAt: '2026-03-27T13:00:00Z' },
    { slug: 'there-are-colors-no-human-has-ever-seen',             key: 'colors',   publishAt: '2026-03-26T13:00:00Z' },
    { slug: 'trees-send-messages-through-underground-fungal-network', key: 'trees', publishAt: '2026-03-25T13:00:00Z' },
    { slug: 'your-brain-predicts-the-future-10-seconds-ahead',     key: 'brain',    publishAt: '2026-03-24T13:00:00Z' },
    { slug: 'thc-creates-false-memories-your-brain-is-lying',      key: 'thc',      publishAt: null },
    { slug: 'cancer-is-not-random-genetic-program-decides',        key: 'cancer',   publishAt: null },
    { slug: 'bull-sharks-have-friends-and-choose-them-carefully',  key: 'sharks',   publishAt: null },
    { slug: 'hedgehogs-hear-ultrasound-secret-superpower',         key: 'hedgehog', publishAt: null },
    { slug: 'mind-bending-science-facts-that-sound-fake',          key: 'science',  publishAt: null }
  ];

  function renderArticles(lang) {
    var now = new Date();
    var grid = document.getElementById('articles-grid');
    if (!grid) return;
    var t = (i18nData && i18nData[lang]) ? i18nData[lang] : null;
    var readText = (t && t['articles_read_article']) ? t['articles_read_article'] : 'Read article \u2192';
    var html = '';
    var delay = 0;
    allArticles.forEach(function(a) {
      // Skip if not yet published
      if (a.publishAt && now < new Date(a.publishAt)) return;
      var title = (t && t['articles_title_' + a.key]) ? t['articles_title_' + a.key] : '';
      var desc  = (t && t['articles_desc_'  + a.key]) ? t['articles_desc_'  + a.key] : '';
      var cat   = (t && t['articles_cat_'   + a.key]) ? t['articles_cat_'   + a.key] : '';
      var date  = (t && t['articles_date_'  + a.key]) ? t['articles_date_'  + a.key] : '';
      var href  = lang !== 'en' ? 'articles/' + lang + '/' + a.slug + '.html' : 'articles/' + a.slug + '.html';
      html += '<a href="' + href + '" class="article-card" style="animation-delay:' + delay.toFixed(2) + 's;">' +
        '<span class="cat-tag">' + cat + '</span>' +
        '<h2>' + title + '</h2>' +
        '<p class="desc">' + desc + '</p>' +
        '<div class="meta">' +
          '<span class="date">' + date + '</span>' +
          '<span class="read-link">' + readText + '</span>' +
        '</div>' +
      '</a>';
      delay += 0.08;
    });
    grid.innerHTML = html;
  }

  // Article link paths (slug => base path) — kept for legacy applyLanguage compat
  var articleSlugs = {};

  function toggleLangMenu() {
    document.getElementById('lang-menu').classList.toggle('open');
  }

  function updateLangButtons() {
    document.getElementById('lang-btn').textContent = '🌐 ' + currentLang.toUpperCase();
    var btns = document.querySelectorAll('.lang-menu button');
    btns.forEach(function(b) { b.classList.remove('active'); });
    btns.forEach(function(b) { if (b.textContent.includes(langNames[currentLang])) b.classList.add('active'); });
    // Mobile lang buttons
    var mlb = document.getElementById('mobile-lang-btn');
    if (mlb) mlb.textContent = '🌐 ' + langNames[currentLang] + ' ▾';
    var mobileButtons = document.querySelectorAll('.mobile-lang-submenu button');
    mobileButtons.forEach(function(b) { b.classList.remove('active'); });
    mobileButtons.forEach(function(b) { if (b.textContent.includes(langNames[currentLang])) b.classList.add('active'); });
  }

  function applyLanguage(lang) {
    if (!i18nData || !i18nData[lang]) return;
    var t = i18nData[lang];
    // Apply all data-i18n elements
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.getAttribute('data-i18n');
      if (t[key]) el.textContent = t[key];
    });
    // Update article card links based on language
    Object.keys(articleSlugs).forEach(function(id) {
      var link = document.getElementById(id);
      if (link) {
        if (lang === 'en') {
          link.href = 'articles/' + articleSlugs[id];
        } else {
          link.href = 'articles/' + lang + '/' + articleSlugs[id];
        }
      }
    });
    // Update mobile theme button text
    var mtb = document.getElementById('mobile-theme-btn');
    if (mtb) {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var themeKey = isDark ? 'theme_dark' : 'theme_light';
      if (t[themeKey]) mtb.textContent = (isDark ? '🌙 ' : '☀️ ') + t[themeKey];
    }
  }

  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    document.getElementById('lang-menu').classList.remove('open');
    // RTL for Arabic
    if (lang === 'ar') { document.documentElement.setAttribute('dir', 'rtl'); }
    else { document.documentElement.removeAttribute('dir'); }
    updateLangButtons();
    applyLanguage(lang);
    renderArticles(lang);
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.lang-dropdown')) {
      document.getElementById('lang-menu').classList.remove('open');
    }
  });

  function toggleTheme() {
    var html = document.documentElement;
    var isDark = html.getAttribute('data-theme') === 'dark';
    if (isDark) {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
      document.getElementById('theme-btn').textContent = '☀️';
      var mtb = document.getElementById('mobile-theme-btn');
      if (mtb) mtb.textContent = '☀️ Light Mode';
    } else {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      document.getElementById('theme-btn').textContent = '🌙';
      var mtb = document.getElementById('mobile-theme-btn');
      if (mtb) mtb.textContent = '🌙 Dark Mode';
    }
    // Re-apply language for theme button text
    if (i18nData && i18nData[currentLang]) applyLanguage(currentLang);
  }

  function toggleMenu() {
    var menu = document.getElementById('mobile-menu');
    menu.classList.toggle('open');
    document.getElementById('hamburger-btn').textContent = menu.classList.contains('open') ? '✕' : '☰';
  }

  function toggleMobileLangSubmenu() {
    document.getElementById('mobile-lang-submenu').classList.toggle('open');
  }
  function closeMobileLangSubmenu() {
    document.getElementById('mobile-lang-submenu').classList.remove('open');
  }

  function openCategories() {
    window.location.href = 'index.html#categories';
  }

  // Fetch translations and apply saved language on load
  (function() {
    // Apply saved theme
    var saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.getElementById('theme-btn').textContent = '🌙';
      var mtb = document.getElementById('mobile-theme-btn');
      if (mtb) mtb.textContent = '🌙 Dark Mode';
    }

    var lang = localStorage.getItem('lang') || 'en';
    currentLang = lang;

    // Set RTL immediately if Arabic
    if (lang === 'ar') document.documentElement.setAttribute('dir', 'rtl');

    // Update buttons immediately
    updateLangButtons();

    // Fetch translations then apply
    fetch('translations.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        i18nData = data;
        applyLanguage(currentLang);
        renderArticles(currentLang);
      })
      .catch(function(err) {
        console.warn('Could not load translations:', err);
      });
  })();
  </script>

</body>
</html>
